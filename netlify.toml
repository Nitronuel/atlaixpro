[build]
  command = "npm run build"
  publish = "dist"

# Proxy production API requests to the Atlaix backend gateway.
[[redirects]]
  from = "/api/*"
  to = "https://atlaixpro-production.up.railway.app/api/:splat"
  status = 200
  force = true

# Support React Router by serving the app shell for all browser routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
