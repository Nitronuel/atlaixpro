[build]
  command = "npm run build"
  publish = "dist"

# Production API gateway routing for deployed Atlaix builds.
[[redirects]]
  from = "/api/*"
  to = "https://atlaixpro-production.up.railway.app/api/:splat"
  status = 200
  force = true

# React Router fallback for browser-managed application routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
